<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>AI Run Coach</title>
    <link rel="manifest" href="manifest.json" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: #000000;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        font-size: 14px;
        overflow: hidden;
      }

      #app {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      /* Text styles */
      .text-title {
        font-size: 32px;
        font-weight: 700;
      }

      .text-normal {
        font-size: 18px;
        font-weight: 500;
      }

      .text-small {
        font-size: 14px;
        font-weight: 400;
      }

      .text-tiny {
        font-size: 12px;
        font-weight: 400;
      }

      /* Colors */
      .text-cyan {
        fill: #00cfff;
      }

      .text-white {
        fill: #ffffff;
      }

      .text-gray {
        fill: #666666;
      }

      .text-green {
        fill: #00e676;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="app.js"></script>
  </body>
</html>
